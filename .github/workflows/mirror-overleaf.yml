name: Mirror Overleaf Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and push Overleaf image
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "GitHub owner: ${OWNER}"

          docker pull sharelatex/sharelatex:6.2.0

          docker tag \
            sharelatex/sharelatex:6.2.0 \
            ghcr.io/${OWNER}/sharelatex:6.2.0

          docker push ghcr.io/${OWNER}/sharelatex:6.2.0
